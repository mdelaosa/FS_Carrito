<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>agoodshop</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <div class="navbar">
            <div class="logo">
                <img src="SOURCES/logo.png" alt="agoodshop" class="shop-logo">
            </div>
        </div>
    </header>

    <hr class="header-line">

    <main>
        <section id="carrito">
            <div class="cabecera-tabla">
                <span class="col-producto">Producto</span>
                <span class="col-cantidad">Cantidad</span>
                <span class="col-unidad">Unidad</span>
                <span class="col-total">Total</span>
            </div>

            <div id="productos-container">
                <!-- script.js -->
            </div>
        </section>

        <div id="panel-total">
            <h2>Total</h2>
            <hr>
            <div id="resumen">
                <!-- script.js -->
            </div>
            <hr>
            <div class="resumen-linea">
                <span>TOTAL</span>
                <strong id="total">0€</strong>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="footer-logo">
            <p><i class="fa-regular fa-copyright"></i> agoodshop </p>
            </div>
        <nav class="footer-socials">
            <a href="#">X</a>
            <a href="#">Instagram</a>
            <a href="#">Pinterest</a>
        </nav>
    </footer>

    <script src="carrito.js"></script>
</body>
</html>
